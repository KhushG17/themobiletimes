name: Daily Posts

on:
  schedule:
    - cron: '30 2 * * *'    # Slot 1 — 08:00 IST
    - cron: '30 6 * * *'    # Slot 2 — 12:00 IST
    - cron: '30 10 * * *'   # Slot 3 — 16:00 IST
    - cron: '30 14 * * *'   # Slot 4 — 20:00 IST
  workflow_dispatch:
    inputs:
      slot:
        description: 'Slot to run (1–4). Leave blank to run all 4 at once.'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: Automation/requirements.txt

      - name: Install dependencies
        run: pip install -r Automation/requirements.txt

      - name: Determine slot number
        id: slot
        run: |
          if [ -n "${{ github.event.inputs.slot }}" ]; then
            echo "num=${{ github.event.inputs.slot }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 2 * * *" ]; then
            echo "num=1" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 6 * * *" ]; then
            echo "num=2" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 10 * * *" ]; then
            echo "num=3" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 14 * * *" ]; then
            echo "num=4" >> $GITHUB_OUTPUT
          else
            echo "num=" >> $GITHUB_OUTPUT
          fi

      - name: Run post
        working-directory: Automation
        env:
          WP_URL:               ${{ secrets.WP_URL }}
          WP_USER:              ${{ secrets.WP_USER }}
          WP_APP_PASS:          ${{ secrets.WP_APP_PASS }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          FAL_API_KEY:          ${{ secrets.FAL_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL:     ${{ secrets.TELEGRAM_CHANNEL }}
          TWITTER_API_KEY:      ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:   ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_ID:      ${{ secrets.LINKEDIN_ORG_ID }}
          META_ACCESS_TOKEN:    ${{ secrets.META_ACCESS_TOKEN }}
          META_PAGE_ID:         ${{ secrets.META_PAGE_ID }}
          UNSPLASH_ACCESS_KEY:  ${{ secrets.UNSPLASH_ACCESS_KEY }}
          NEWS_API_KEY:         ${{ secrets.NEWS_API_KEY }}
          TMT_SECRET:           ${{ secrets.TMT_SECRET }}
          INDEXNOW_KEY:         ${{ secrets.INDEXNOW_KEY }}
          GSC_PROPERTY:         ${{ secrets.GSC_PROPERTY }}
          LOGO_PATH:            assets/Circle_Logo.png
        run: |
          if [ -n "${{ steps.slot.outputs.num }}" ]; then
            python mobiletimes_agent.py --slot ${{ steps.slot.outputs.num }}
          else
            python mobiletimes_agent.py --run-now
          fi

  notify_failure:
    name: Email alert on failure
    needs: publish
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: themobiletimes@gmail.com
          password: ${{ secrets.ALERT_EMAIL_PASS }}
          subject: "TMT Alert: Daily Posts workflow failed"
          to: goyalkhush1214@gmail.com
          from: "TMT Automation <themobiletimes@gmail.com>"
          body: |
            A daily post slot failed to publish.

            Workflow:  ${{ github.workflow }}
            Run ID:    ${{ github.run_id }}
            Trigger:   ${{ github.event_name }}

            View full logs and re-run:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
