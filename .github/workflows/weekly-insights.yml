name: Weekly Insights Blog

on:
  schedule:
    - cron: '0 3 * * 1'   # Monday    08:30 IST — Industry Insights
    - cron: '0 3 * * 3'   # Wednesday 08:30 IST — Case Studies
    - cron: '0 3 * * 5'   # Friday    08:30 IST — How-to Guides
  workflow_dispatch:
    inputs:
      subcategory:
        description: 'Blog subcategory to publish'
        required: true
        type: choice
        options:
          - industry-insights
          - case-studies
          - how-to-guides

jobs:
  blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: Automation/requirements.txt

      - name: Install dependencies
        run: pip install -r Automation/requirements.txt

      - name: Determine subcategory
        id: sub
        run: |
          if [ -n "${{ github.event.inputs.subcategory }}" ]; then
            echo "cat=${{ github.event.inputs.subcategory }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 3 * * 1" ]; then
            echo "cat=industry-insights" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 3 * * 3" ]; then
            echo "cat=case-studies" >> $GITHUB_OUTPUT
          else
            echo "cat=how-to-guides" >> $GITHUB_OUTPUT
          fi

      - name: Publish weekly insights blog
        working-directory: Automation
        env:
          WP_URL:               ${{ secrets.WP_URL }}
          WP_USER:              ${{ secrets.WP_USER }}
          WP_APP_PASS:          ${{ secrets.WP_APP_PASS }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          FAL_API_KEY:          ${{ secrets.FAL_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL:     ${{ secrets.TELEGRAM_CHANNEL }}
          TWITTER_API_KEY:      ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:   ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_ID:      ${{ secrets.LINKEDIN_ORG_ID }}
          META_ACCESS_TOKEN:    ${{ secrets.META_ACCESS_TOKEN }}
          META_PAGE_ID:         ${{ secrets.META_PAGE_ID }}
          NEWS_API_KEY:         ${{ secrets.NEWS_API_KEY }}
          TMT_SECRET:           ${{ secrets.TMT_SECRET }}
          UNSPLASH_ACCESS_KEY:  ${{ secrets.UNSPLASH_ACCESS_KEY }}
          INDEXNOW_KEY:         ${{ secrets.INDEXNOW_KEY }}
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          LOGO_PATH:            assets/Circle_Logo.png
        run: python mobiletimes_agent.py --blog ${{ steps.sub.outputs.cat }}

  notify_failure:
    name: Email alert on failure
    needs: blog
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: themobiletimes@gmail.com
          password: ${{ secrets.ALERT_EMAIL_PASS }}
          subject: "TMT Alert: Weekly Insights Blog failed"
          to: goyalkhush1214@gmail.com
          from: "TMT Automation <themobiletimes@gmail.com>"
          body: |
            The weekly insights blog failed to publish.

            Workflow:  ${{ github.workflow }}
            Run ID:    ${{ github.run_id }}

            View full logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
