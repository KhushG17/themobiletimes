name: Monthly SEO Optimizer

on:
  schedule:
    - cron: '0 3 1 * *'    # 03:00 UTC on the 1st of every month
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: Automation/requirements.txt

      - name: Install dependencies
        run: pip install -r Automation/requirements.txt

      - name: Run GSC optimizer
        working-directory: Automation
        env:
          WP_URL:            ${{ secrets.WP_URL }}
          WP_USER:           ${{ secrets.WP_USER }}
          WP_APP_PASS:       ${{ secrets.WP_APP_PASS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GSC_PROPERTY:      ${{ secrets.GSC_PROPERTY }}
        run: |
          if [ -f gsc-credentials.json ]; then
            python gsc_optimizer.py
          else
            echo "gsc-credentials.json not found — skipping GSC optimizer"
            echo "Add your Google service account JSON as a GitHub Secret named GSC_CREDENTIALS"
            echo "and update this workflow to write it to gsc-credentials.json before running"
          fi
