name: Breaking News Monitor

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes, 24/7
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: Automation/requirements.txt

      - name: Install dependencies
        run: pip install -r Automation/requirements.txt

      - name: Run breaking news scan (single check)
        working-directory: Automation
        env:
          WP_URL:               ${{ secrets.WP_URL }}
          WP_USER:              ${{ secrets.WP_USER }}
          WP_APP_PASS:          ${{ secrets.WP_APP_PASS }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL:     ${{ secrets.TELEGRAM_CHANNEL }}
          TWITTER_API_KEY:      ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:   ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_ID:      ${{ secrets.LINKEDIN_ORG_ID }}
          NEWS_API_KEY:         ${{ secrets.NEWS_API_KEY }}
          TMT_SECRET:           ${{ secrets.TMT_SECRET }}
          INDEXNOW_KEY:         ${{ secrets.INDEXNOW_KEY }}
          LOGO_PATH:            assets/Circle_Logo.png
        run: python breaking_monitor.py --once

  notify_failure:
    name: Email alert on failure
    needs: monitor
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: themobiletimes@gmail.com
          password: ${{ secrets.ALERT_EMAIL_PASS }}
          subject: "TMT Alert: Breaking News Monitor failed"
          to: goyalkhush1214@gmail.com
          from: "TMT Automation <themobiletimes@gmail.com>"
          body: |
            The breaking news monitor hit an unexpected error (not a "no story" skip — an actual crash).

            Workflow:  ${{ github.workflow }}
            Run ID:    ${{ github.run_id }}

            View full logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
